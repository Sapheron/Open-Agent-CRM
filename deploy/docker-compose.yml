

# ─────────────────────────────────────────────────────────────────────────────
# Open Agent CRM — Production Stack
#
# All services run on localhost ports.
# You handle SSL + reverse proxy yourself (nginx / caddy / apache).
# See proxy setup instructions printed by the installer.
# ─────────────────────────────────────────────────────────────────────────────

services:

  # ─── API (NestJS) ─────────────────────────────────────────────
  api:
    image: ghcr.io/sapheron/open-agent-crm/api:latest
    build:
      context: ..
      dockerfile: apps/api/Dockerfile
    ports:
      - "127.0.0.1:3000:3000"
    env_file:
      - ../.env
    environment:
      - NODE_ENV=production
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ─── Dashboard (Next.js) ──────────────────────────────────────
  dashboard:
    image: ghcr.io/sapheron/open-agent-crm/dashboard:latest
    build:
      context: ..
      dockerfile: apps/dashboard/Dockerfile
    ports:
      - "127.0.0.1:3001:3001"
    env_file:
      - ../.env
    environment:
      - NODE_ENV=production
    depends_on:
      - api
    restart: unless-stopped

  # ─── WhatsApp service (Baileys) ───────────────────────────────
  whatsapp:
    image: ghcr.io/sapheron/open-agent-crm/whatsapp:latest
    build:
      context: ..
      dockerfile: apps/whatsapp/Dockerfile
    env_file:
      - ../.env
    environment:
      - NODE_ENV=production
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    volumes:
      - wa_sessions:/app/sessions

  # ─── Worker (BullMQ + AI agent) ───────────────────────────────
  worker:
    image: ghcr.io/sapheron/open-agent-crm/worker:latest
    build:
      context: ..
      dockerfile: apps/worker/Dockerfile
    env_file:
      - ../.env
    environment:
      - NODE_ENV=production
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  # ─── PostgreSQL 16 ────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    environment:
      - POSTGRES_USER=${DB_USER:-crm}
      - POSTGRES_PASSWORD=${DB_PASSWORD:-crm_pass}
      - POSTGRES_DB=${DB_NAME:-wacrm}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-crm} -d ${DB_NAME:-wacrm}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── PgBouncer ────────────────────────────────────────────────
  pgbouncer:
    image: edoburu/pgbouncer:latest
    environment:
      - DATABASE_URL=postgres://${DB_USER:-crm}:${DB_PASSWORD:-crm_pass}@postgres:5432/${DB_NAME:-wacrm}
      - POOL_MODE=transaction
      - MAX_CLIENT_CONN=200
      - DEFAULT_POOL_SIZE=20
      - AUTH_TYPE=scram-sha-256
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  # ─── Redis 7 ──────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy noeviction
    volumes:
      - redis_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── MinIO (media storage) ────────────────────────────────────
  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    ports:
      - "127.0.0.1:9000:9000"   # S3 API
      - "127.0.0.1:9001:9001"   # MinIO Console UI
    env_file:
      - ../.env
    volumes:
      - minio_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ─── Prometheus ───────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    ports:
      - "127.0.0.1:9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    restart: unless-stopped

  # ─── Grafana ──────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:latest
    ports:
      - "127.0.0.1:3002:3000"
    env_file:
      - ../.env
    environment:
      - GF_SERVER_ROOT_URL=%(protocol)s://%(domain)s/grafana
      - GF_SERVER_SERVE_FROM_SUB_PATH=true
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
    restart: unless-stopped

  # ─── Nightly PostgreSQL backup ────────────────────────────────
  backup:
    image: postgres:16-alpine
    env_file:
      - ../.env
    entrypoint: |
      sh -c "
        while true; do
          sleep 86400
          pg_dump -h postgres | gzip > /backups/wacrm-\$(date +%Y%m%d).sql.gz
          find /backups -name '*.sql.gz' -mtime +30 -delete
          echo \"Backup done: \$(date)\"
        done
      "
    volumes:
      - backup_data:/backups
    depends_on:
      - postgres
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  minio_data:
  grafana_data:
  prometheus_data:
  backup_data:
  wa_sessions:
